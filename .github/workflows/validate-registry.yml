name: Validate Registry

on:
  push:
    paths:
      - "registry.json"
      - "schemas/**"
      - "anchors/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/validate-registry.yml"
  pull_request:
    paths:
      - "registry.json"
      - "schemas/**"
      - "anchors/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/validate-registry.yml"

jobs:
  validate:
    runs
