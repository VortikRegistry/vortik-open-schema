name: Validate Registry

on:
  push:
    paths:
      - "registry.json"
      - "schemas/**"
      - "anchors/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/validate-registry.yml"
  pull_request:
    paths:
      - "registry.json"
      - "schemas/**"
      - "anchors/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/validate-registry.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run registry validator
        run: node scripts/validate-registry.mjs
