name: Generate Coordination Map

on:
  push:
    paths:
      - "registry.json"
      - "scripts/generate-map.mjs"
      - "package.json"
      - ".github/workflows/generate-map.yml"
  workflow_dispatch:

jobs:
  generate-map:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate coordination map
        run: node scripts/generate-map.mjs

      - name: Commit generated map if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add coordination-map.txt

          git diff --cached --quiet || git commit -m "auto-generate coordination map"
          git push
