name: Validate Vortik Registry

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (if any)
        run: npm install || true

      - name: Validate registry.json
        run: |
          if [ ! -f registry.json ]; then
            echo "❌ registry.json missing"
            exit 1
          fi
          node -e "JSON.parse(require('fs').readFileSync('registry.json','utf8'))"
          echo "✅ registry.json valid"

      - name: Validate anchors.index.json
        run: |
          if [ ! -f anchors.index.json ]; then
            echo "❌ anchors.index.json missing"
            exit 1
          fi
          node -e "JSON.parse(require('fs').readFileSync('anchors.index.json','utf8'))"
          echo "✅ anchors.index.json valid"

      - name: Validate coordination surfaces
        run: |
          if [ ! -f maps/coordination-surfaces.json ]; then
            echo "❌ coordination-surfaces.json missing"
            exit 1
          fi
          node -e "JSON.parse(require('fs').readFileSync('maps/coordination-surfaces.json','utf8'))"
          echo "✅ coordination-surfaces.json valid"

      - name: Validate coordination stack
        run: |
          if [ ! -f maps/coordination-stack.json ]; then
            echo "❌ coordination-stack.json missing"
            exit 1
          fi
          node -e "JSON.parse(require('fs').readFileSync('maps/coordination-stack.json','utf8'))"
          echo "✅ coordination-stack.json valid"

      - name: Run schema cleanup check
        run: node scripts/fix-schemas.cjs

      - name: Generate coordination map
        run: node scripts/generate-map.mjs

      - name: Sync docs
        run: node scripts/sync-docs.mjs

      - name: Commit docs updates
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs
          git diff --cached --quiet || git commit -m "sync docs"
          git push

      - name: Done
        run: echo "🎯 All validations passed"
