name: Validate Vortik Registry

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vortik-registry-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies if needed
        run: npm install || true

      - name: Validate raw JSON files before generation
        run: node scripts/validate-json-files.mjs

      - name: Validate registry source
        run: node scripts/validate-registry.mjs

      - name: Sync schemas from registry
        run: node scripts/sync-schemas-from-registry.mjs

      - name: Generate sources from registry
        run: node scripts/generate-sources-from-registry.mjs

      - name: Fix schemas
        run: node scripts/fix-schemas.cjs

      - name: Generate anchors index
        run: node scripts/generate-anchors-index.mjs

      - name: Generate market index
        run: node scripts/generate-market-index.mjs

      - name: Generate coordination map
        run: node scripts/generate-map.mjs

      - name: Generate market document
        run: node scripts/generate-market-doc.mjs

      - name: Generate market HTML
        run: node scripts/generate-market-html.mjs

      - name: Sync docs
        run: node scripts/sync-docs.mjs

      - name: Run full validation after generation
        run: npm run validate

      - name: Commit generated updates
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add registry.json
          git add anchors.index.json
          git add market.index.json
          git add maps/
          git add schemas/
          git add anchors/
          git add docs/

          git diff --cached --quiet || git commit -m "generate derived registry files"
          git push

      - name: Done
        run: echo "🎯 Vortik registry validation and generation completed"
