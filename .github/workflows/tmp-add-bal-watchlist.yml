name: Temporary BAL watchlist update

on:
  push:
    branches:
      - maps/add-bal-sidecar-watchlist-terms

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: maps/add-bal-sidecar-watchlist-terms
          fetch-depth: 0

      - name: Add source-backed BAL sidecar terms
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'maps/protocol-signal-watchlist.json';
          const data = JSON.parse(fs.readFileSync(file, 'utf8'));

          const additions = [
            {
              term: 'EIP-8146',
              category: 'eip_signal',
              related_eips: ['EIP-8146', 'EIP-7732', 'EIP-7928', 'EIP-8081'],
              status: 'proposed_for_hegota',
              evidence_level: 'high',
              public_claim_allowed: 'Draft Core EIP proposed for inclusion in Hegotá; do not describe it as scheduled, included, deployed, or activated.',
              internal_notes: 'Track EIP-8146 as the source for independent Block Access List sidecars, a shared BAL commitment in ExecutionPayloadBid, PTC BAL-availability reporting, dedicated gossip, and early Engine API delivery.',
              risk_notes: 'Preserve the Proposed for Inclusion boundary and do not infer activation dates, final fork delivery, a new architectural layer, or registry-anchor promotion.'
            },
            {
              term: 'Block Access List sidecar',
              category: 'protocol_artifact',
              related_eips: ['EIP-8146', 'EIP-7928', 'EIP-7732'],
              status: 'proposed_for_hegota',
              evidence_level: 'high',
              public_claim_allowed: 'Source-backed EIP-8146 protocol artifact; proposed for Hegotá and not yet scheduled or activated.',
              internal_notes: 'Track the independent BlockAccessListSidecar object and block_access_list_sidecar gossip path separately from the execution payload envelope.',
              risk_notes: 'Do not describe the sidecar as a new Ethereum layer or as deployed protocol behavior.'
            },
            {
              term: 'BAL commitment',
              category: 'commitment_semantics',
              related_eips: ['EIP-8146', 'EIP-7928', 'EIP-7732'],
              status: 'proposed_for_hegota',
              evidence_level: 'high',
              public_claim_allowed: 'Technical commitment signal tied to block_access_list_hash in the EIP-8146 bid flow.',
              internal_notes: 'Track the reuse of keccak256(rlp(BlockAccessList)) in ExecutionPayloadBid and sidecar verification as a concrete builder commitment.',
              risk_notes: 'Do not treat BAL commitment as evidence that commitment layer is canonical Ethereum terminology.'
            },
            {
              term: 'BAL availability',
              category: 'availability_semantics',
              related_eips: ['EIP-8146', 'EIP-7732'],
              status: 'proposed_for_hegota',
              evidence_level: 'high',
              public_claim_allowed: 'Technical availability signal represented by block_access_list_present; proposed rather than activated.',
              internal_notes: 'Track BAL availability separately from payload presence, blob-data availability, and execution validity in PTC-facing semantics.',
              risk_notes: 'Do not collapse availability reporting into execution validity, deployment, or guaranteed final delivery.'
            },
            {
              term: 'execution-state prefetch',
              category: 'execution_semantics',
              related_eips: ['EIP-8146', 'EIP-7928'],
              status: 'proposed_for_hegota',
              evidence_level: 'medium',
              public_claim_allowed: 'Implementation-facing execution optimization enabled by early BAL delivery; not a complete parallel-execution claim.',
              internal_notes: 'Track the Engine API handoff that lets the execution layer prefetch declared accounts and storage slots before the payload envelope arrives.',
              risk_notes: 'Do not claim EIP-8146 alone implements a complete parallel-execution or post-state computation architecture.'
            }
          ];

          const existing = new Set(data.entries.map((entry) => entry.term));
          for (const entry of additions) {
            if (!existing.has(entry.term)) data.entries.push(entry);
          }

          const hegota = data.entries.find((entry) => entry.term === 'Hegotá');
          if (hegota && !hegota.related_eips.includes('EIP-8146')) {
            hegota.related_eips.push('EIP-8146');
          }
          if (hegota) {
            hegota.internal_notes = 'Track Hegotá as the post-Glamsterdam fork context for FOCIL and proposed BAL-sidecar work. EIP-7805 is Scheduled for Inclusion, while EIP-8146 remains Proposed for Inclusion; activation values remain unset.';
            hegota.risk_notes = 'Preserve proposal-specific inclusion stages. Do not infer activation dates, deployment, guaranteed delivery, or inclusion of proposals not listed as Scheduled.';
          }

          fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          NODE

      - name: Commit watchlist update
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add maps/protocol-signal-watchlist.json
          git commit -m "docs: add BAL sidecar watchlist terms"
          git push origin HEAD:maps/add-bal-sidecar-watchlist-terms
