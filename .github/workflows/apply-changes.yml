name: Apply Changes

on:
  workflow_dispatch:
  push:
    paths:
      - "updates/change-request.json"

jobs:
  apply:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply changes
        run: node scripts/apply-changes.cjs

      - name: Validate after apply
        run: node scripts/validate-registry.mjs

      - name: Commit changes if valid
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet || git commit -m "apply semantic changes"
          git push
