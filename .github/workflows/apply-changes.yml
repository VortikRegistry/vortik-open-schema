name: Apply Change Request

on:
  workflow_dispatch:
  push:

jobs:
  apply:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run scripts
        run: |
          node scripts/apply-changes.cjs
          node scripts/generate-views.cjs

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Apply automated changes" || echo "No changes"
          git push
